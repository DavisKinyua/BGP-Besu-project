log stderr all;
router id 172.18.0.30;
protocol device { scan time 10; }

protocol direct { ipv4; interface "eth*"; }
protocol kernel { ipv4 { import all; export all; }; learn; }

# --- FILTERS ---

# Filter 1: INBOUND from Customers
# Action: Accept the route AND stamp it with Community (300,100)
filter tag_customers {
    # You can add safety checks here (e.g., ensure they don't send bogons)
    bgp_community.add((300,100)); 
    accept;
}

# Filter 2: OUTBOUND to Upstream (AS200)
# Action: Only send routes that have the (300,100) tag OR my own network
filter export_to_upstream {
    # Check if the community list contains (300,100)
    if (300,100) ~ bgp_community then accept;
    
    # Also export my own infrastructure
    if net = 10.3.0.0/24 then accept;
    
    reject;
}

# --- PROTOCOLS ---

# Upstream (AS200)
protocol bgp AS200 {
  local as 300;
  neighbor 172.18.0.20 as 200;
  ipv4 { 
      import all; 
      export filter export_to_upstream; # <--- Uses the Community Check
  };
}

# Downstream 1 (AS400)
protocol bgp AS400 {
  local as 300;
  neighbor 172.18.0.40 as 400;
  ipv4 { 
      import filter tag_customers;      # <--- Applies the Tag
      export all; 
  };
}

# Downstream 2 (AS600)
protocol bgp AS600 {
  local as 300;
  neighbor 172.18.0.60 as 600;
  ipv4 { 
      import filter tag_customers;      # <--- Applies the Tag
      export all; 
  };
}