# ==============================================================================
# AS600 BIRD Configuration (The Unprotected Victim)
# ==============================================================================

# --- 1. GLOBAL SETTINGS ---
log stderr all;
router id 172.18.0.60;


# --- 2. CORE SYSTEM PROTOCOLS ---
protocol device { 
    scan time 10; 
}

protocol direct { 
    ipv4; 
    interface "eth*"; 
}

protocol kernel { 
    ipv4 { 
        import all; 
        export all; 
    }; 
    learn; 
}


# --- 3. FILTERS & POLICIES ---
# This filter ensures AS600 only announces its own network to the world 
# (It prevents AS600 from becoming a transit provider for other networks).
filter my_networks {
    if net = 10.6.0.0/24 then accept;
    #if net = 10.100.0.1/32 then accept;
    #if net = 10.1.0.0/24 then accept;
    reject;
}

#protocol static hijack_static { 
#    ipv4; 
#    route 10.7.0.0/24 unreachable; 
#    route 10.100.0.1/32 unreachable; # ROA Payload
#    route 10.1.0.0/24 unreachable;   # ASPA Payload
#}

# --- 4. BGP PEERS ---

# Upstream (AS300)
# Receives the legitimate internet routes (including 10.100.0.0/24)
protocol bgp AS300 {
    local as 600;
    neighbor 172.18.0.30 as 300;
    ipv4 { 
        import all; 
        export filter my_networks; 
    };
}

# Peer (AS500 - The Attacker)
# Receives the hijacked, highly-specific route (10.100.0.1/32). 
# Because there is no ROA/ASPA filtering here, the poison enters the network!
protocol bgp AS500 {
    local as 600;
    neighbor 172.18.0.50 as 500;
    ipv4 { 
        import all; 
        export all; 
    };
}