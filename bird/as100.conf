#bird/as100.conf
# --- AS 100 (Victim / Service) ---
# advertise: 
# 1. The Target IP (10.100.0.1) on Loopback
# 2. The Local LAN (10.1.0.0/24) where Validator 1 lives

log stderr all;
router id 172.18.0.10;
protocol device { scan time 10; }

# Look at Loopback (Target) AND Ethernet (Validator LAN)
protocol direct { 
  ipv4; 
  interface "lo", "eth*"; 
}

protocol kernel { ipv4 { import all; export all; }; learn; }

protocol static {
    ipv4;
    # Define the full block you want to advertise
    route 10.100.0.0/24 unreachable; 
}

filter my_networks {
    if net = 10.100.0.0/24 then accept;  # The Anchor
    #if net = 10.100.0.1/32 then accept;  # The Target
    if net = 10.1.0.0/24 then accept;    # The LAN
    reject; # Drop everything else (like 172.18.x.x)
}

protocol bgp AS200 {
  local as 100;
  neighbor 172.18.0.20 as 200;
  ipv4 {
      import all;
      export filter my_networks;  # Use the filter instead of 'all'
  };
}

