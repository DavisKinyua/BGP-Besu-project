#bird/as200.conf
log stderr all;
router id 172.18.0.20;
protocol device { scan time 10; }

protocol direct { ipv4; interface "eth*"; }
protocol kernel { ipv4 { import all; export all; }; learn; }

# --- FILTERS ---

# Filter 1: INBOUND from Downstream (AS300)
# Action: Tag AS300 routes as "Customer" (200,100)
filter tag_customers {
    bgp_community.add((200,100));
    accept;
}

# Filter 2: OUTBOUND to AS100 (Victim)
# Action: Only send "Customer" routes + My own network
filter export_to_as100 {
    # Allow routes with Community (200,100)
    if (200,100) ~ bgp_community then accept;
    
    # Allow my own network
    if net = 10.2.0.0/24 then accept;
    
    reject;
}

# --- PROTOCOLS ---

# Downstream (AS300)
protocol bgp AS300 {
  local as 200;
  neighbor 172.18.0.30 as 300;
  ipv4 { 
      import filter tag_customers; 
      export all; 
  };
}

# Peer/Customer (AS100 - The Victim)
protocol bgp AS100 {
  local as 200;
  neighbor 172.18.0.10 as 100;
  ipv4 { 
      import all; 
      export filter export_to_as100; 
  };
}