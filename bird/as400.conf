# Include the dynamic blocklist managed by Uni-Guard
include "blocklist.conf";

log stderr all;
router id 172.18.0.40;

protocol device { scan time 10; }

protocol direct { 
  ipv4; 
  interface "eth*"; 
}

protocol kernel { 
  ipv4 { import all; export all; }; 
  learn; 
}

# Simple filter: Only announce my own prefix
filter my_networks {
    if net = 10.4.0.0/24 then accept;
    reject;
}

# Surgically evaluate the path using the function from Uni-Guard
filter bgp_in {
    if check_blocklist() then {
        print "Rejected hijacked route: ", net;
        reject;
    }
    accept;
}

# Upstream (AS300)
protocol bgp AS300 {
  local as 400;
  neighbor 172.18.0.30 as 300;
  ipv4 { 
      import filter bgp_in; 
      export filter my_networks; 
  };
}

# Peer (AS500 - Attacker)
protocol bgp AS500 {
  local as 400;
  neighbor 172.18.0.50 as 500;
  ipv4 {
      import filter bgp_in;
      export filter my_networks; 
  };
}