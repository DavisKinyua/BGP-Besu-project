log stderr all;
router id 172.18.0.30;

protocol device {
    scan time 10;
}

# Connect to Peer ISP (AS200)
protocol bgp peer200 {
    local as 300;
    neighbor 172.18.0.20 as 200;
    
    ipv4 {
        import all;
        export all;
    };
}

# Connect to Customer (AS400 - Defender)
protocol bgp customer400 {
    local as 300;
    neighbor 172.18.0.40 as 400;
    
    ipv4 {
        import all;
        export all;
    };
}

# Connect to Attacker ISP (AS500)
protocol bgp attacker {
    local as 300;
    neighbor 172.18.0.50 as 500;
    
    ipv4 {
        import all;
        export all;
    };
}