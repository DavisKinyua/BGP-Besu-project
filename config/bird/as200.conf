log stderr all;
router id 172.18.0.20;

protocol device {
    scan time 10;
}

# Connect to Downstream Customer (AS100)
protocol bgp customer {
    local as 200;
    neighbor 172.18.0.10 as 100;
    
    ipv4 {
        import all;
        export all;
    };
}

# Connect to Peer_isp (AS300)
protocol bgp peer_isp {
    local as 200;
    neighbor 172.18.0.30 as 300;
    
    ipv4 {
        import all;
        export all;
    };
}