log stderr all;
router id 172.18.0.40;

protocol device {
    scan time 10;
}

protocol kernel {
    ipv4 {
        export all;
    };
    merge paths on;
}

# Connect to Upstream ISP (AS300)
protocol bgp upstream {
    local as 400;
    neighbor 172.18.0.30 as 300;
    
    ipv4 {
        import all;
        export all;
    };
}