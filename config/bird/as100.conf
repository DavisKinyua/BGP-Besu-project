# bird/as100.conf
log stderr all;
router id 172.18.0.10;

protocol device {
    scan time 10;
}

protocol direct {
    disabled;
}

protocol static {
    ipv4;
    route 10.100.0.0/24 via "lo";
}

protocol bgp uplink {
    local as 100;
    neighbor 172.18.0.20 as 200;
    
    ipv4 {
        import all;
        export all;
    };
}