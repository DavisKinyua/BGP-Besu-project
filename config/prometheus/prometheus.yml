# my global config
global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  # ==========================================
  # GROUP 1: BESU NODES (Consolidated)
  # ==========================================
  # We use a single job_name 'besu' so the Grafana Dashboard
  # "Job" dropdown sees all nodes at once.
  - job_name: 'besu'
    scrape_interval: 15s
    metrics_path: /metrics
    
    static_configs:
      # Sub-group A: The Validators
      - targets:
          - 'validator1:9545'
          - 'validator2:9545'
          - 'validator3:9545'
          - 'validator4:9545'
          - 'validator5:9545'
        labels:
          service: 'validator'
          group: 'consensus'

      # Sub-group B: The RPC Node
      - targets:
          - 'rpcnode:9545'
        labels:
          service: 'rpc'
          group: 'gateway'

  # ==========================================
  # GROUP 2: BGP ROUTERS
  # ==========================================
  - job_name: 'bird-routers'
    scrape_interval: 15s
    static_configs:
      - targets: ['bird-exporter-as100:9324']
        labels:
          router: 'as100'
      
      - targets: ['bird-exporter-as200:9324']
        labels:
          router: 'as200'

      - targets: ['bird-exporter-as300:9324']
        labels:
          router: 'as300'

      - targets: ['bird-exporter-as400:9324']
        labels:
          router: 'as400'

      - targets: ['bird-exporter-as500:9324']
        labels:
          router: 'as500'

      - targets: ['bird-exporter-as600:9324']
        labels:
          router: 'as600'