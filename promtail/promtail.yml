server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: besu
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            container: container
            level: level
            class: class
            message: message
            throwable: throwable
            thread: thread
            logger: logger
      - labels:
          container:
          level:
      - timestamp:
          source: timestamp
          format: ISO8601
      # - template:
      #     source: throwable
      #     template: '{{if .Value }} {{- " | Stack Trace: " -}}{{- .Value -}} {{else}} {{- " " -}} {{end}}'
    static_configs:
    - targets:
        - localhost
      labels:
        job: besu
        __path__: /var/log/**/*.log

  - job_name: tessera
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            container: container
            level: level
            class: class
            message: message
            throwable: throwable
            thread: thread
            logger: logger
      - labels:
          container:
          level:
      - timestamp:
          source: timestamp
          format: ISO8601
      # - template:
      #     source: throwable
      #     template: '{{if .Value }} {{- " | Stack Trace: " -}}{{- .Value -}} {{else}} {{- " " -}} {{end}}'              
    static_configs:
    - targets:
        - localhost
      labels:
        job: tessera
        __path__: /var/log/tessera/*.log
             
  - job_name: quorum
    static_configs:
    - targets:
        - localhost
      labels:
        job: quorum
        __path__: /var/log/quorum/*.log 

  # ==========================================
  # 1. DOCKER CONTAINER LOGS (For Uni-Guard)
  # ==========================================
  # This section reads logs from the Docker socket.
  # It captures stdout/stderr from 'uni-guard' and all other containers.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Extract the container name (e.g., /project_uni-guard_1 -> uni-guard)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(?:[^/]+_)?([^/]+?)(?:_[0-9]+)?'  # Regex to clean up docker-compose names
        target_label: 'container_name'
      
      # Optional: Add a specific label for your dashboard queries
      - source_labels: ['container_name']
        target_label: 'job' 
        replacement: 'docker'
